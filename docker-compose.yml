services:
  mysql:
    image: mysql:8.0
    container_name: agus_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: agus_club
      MYSQL_USER: agus
      MYSQL_PASSWORD: agus_local
      MYSQL_ROOT_PASSWORD: root_local
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "agus", "-pagus_local"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
