name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  admin:
    name: apps/admin
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: agus_club_testing
          MYSQL_USER: agus
          MYSQL_PASSWORD: agus_local
          MYSQL_ROOT_PASSWORD: root_local
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u agus -pagus_local"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    defaults:
      run:
        working-directory: apps/admin

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo_mysql, intl, gd, mbstring, zip, bcmath
          coverage: none
          tools: composer:v2

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: apps/admin/vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('apps/admin/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Copy .env
        run: cp .env.example .env

      - name: Generate app key
        run: php artisan key:generate

      - name: Set env for CI
        run: |
          sed -i 's/^DB_DATABASE=.*/DB_DATABASE=agus_club_testing/' .env
          sed -i 's/^CACHE_STORE=.*/CACHE_STORE=array/' .env
          sed -i 's/^SESSION_DRIVER=.*/SESSION_DRIVER=array/' .env
          sed -i 's/^QUEUE_CONNECTION=.*/QUEUE_CONNECTION=sync/' .env

      - name: Run migrations
        run: php artisan migrate --force

      - name: Lint (Pint)
        run: ./vendor/bin/pint --test

      - name: Static analysis (Larastan)
        run: ./vendor/bin/phpstan analyse --memory-limit=512M --no-progress

      - name: Tests (Pest)
        run: ./vendor/bin/pest --no-coverage
