services:
  postgres:
    image: postgres:16-alpine
    container_name: agus_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: agus_club
      POSTGRES_USER: agus
      POSTGRES_PASSWORD: agus_local
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agus -d agus_club"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: agus_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.10
    container_name: agus_meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: agus_local_meili_key
      MEILI_ENV: development
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data

volumes:
  postgres_data:
  redis_data:
  meili_data:
